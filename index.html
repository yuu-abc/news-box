<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>news-box</title>
  <style>
    :root {
      --bg: #f6f7f9;
      --panel: #ffffff;
      --panel-soft: #f0f4f8;
      --ink: #17202a;
      --muted: #647181;
      --line: #d9e0e7;
      --accent: #2563eb;
      --accent-dark: #1e40af;
      --green: #0f766e;
      --amber: #b45309;
      --red: #b42318;
      --shadow: 0 12px 28px rgba(23, 32, 42, 0.08);
      --radius: 8px;
      font-family: "Yu Gothic", "Hiragino Kaku Gothic ProN", Meiryo, system-ui, sans-serif;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background: var(--bg);
      color: var(--ink);
    }

    button,
    input,
    textarea,
    select {
      font: inherit;
    }

    button {
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--panel);
      color: var(--ink);
      cursor: pointer;
      min-height: 38px;
      padding: 8px 12px;
    }

    button:hover {
      border-color: #a7b3c1;
      background: #f8fafc;
    }

    button.primary {
      border-color: var(--accent);
      background: var(--accent);
      color: #ffffff;
    }

    button.primary:hover {
      border-color: var(--accent-dark);
      background: var(--accent-dark);
    }

    button:disabled {
      cursor: not-allowed;
      opacity: 0.45;
    }

    textarea,
    input,
    select {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #ffffff;
      color: var(--ink);
      min-height: 38px;
      padding: 8px 10px;
      outline: none;
    }

    textarea:focus,
    input:focus,
    select:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.12);
    }

    textarea {
      min-height: 420px;
      resize: vertical;
      line-height: 1.55;
      font-family: Consolas, "Yu Gothic", monospace;
      font-size: 13px;
    }

    .shell {
      min-height: 100vh;
      display: grid;
      grid-template-rows: auto 1fr;
    }

    .topbar {
      height: 64px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 18px;
      padding: 0 24px;
      background: #ffffff;
      border-bottom: 1px solid var(--line);
      position: sticky;
      top: 0;
      z-index: 10;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 12px;
      min-width: 0;
    }

    .brand-mark {
      width: 34px;
      height: 34px;
      border-radius: 8px;
      background:
        linear-gradient(135deg, #2563eb 0 48%, transparent 48%),
        linear-gradient(315deg, #0f766e 0 47%, #ffffff 47% 54%, #b45309 54%);
      border: 1px solid rgba(23, 32, 42, 0.08);
      flex: 0 0 auto;
    }

    .brand h1 {
      margin: 0;
      font-size: 20px;
      line-height: 1;
      letter-spacing: 0;
    }

    .brand span {
      display: block;
      margin-top: 4px;
      color: var(--muted);
      font-size: 12px;
    }

    .top-actions {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
      justify-content: flex-end;
    }

    .layout {
      display: grid;
      grid-template-columns: minmax(280px, 360px) minmax(420px, 1fr);
      min-height: calc(100vh - 64px);
    }

    .sidebar {
      border-right: 1px solid var(--line);
      background: #ffffff;
      min-width: 0;
      display: grid;
      grid-template-rows: auto 1fr;
    }

    .filters {
      padding: 18px;
      border-bottom: 1px solid var(--line);
      display: grid;
      gap: 10px;
    }

    .filter-row {
      display: grid;
      grid-template-columns: 1fr 130px;
      gap: 8px;
    }

    .news-list {
      overflow: auto;
      padding: 12px;
      display: grid;
      align-content: start;
      gap: 10px;
    }

    .news-item {
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: #ffffff;
      padding: 12px;
      display: grid;
      gap: 8px;
      text-align: left;
      width: 100%;
      min-height: 118px;
    }

    .news-item.active {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.12);
    }

    .news-item h3 {
      margin: 0;
      font-size: 15px;
      line-height: 1.35;
    }

    .news-item p {
      margin: 0;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.45;
    }

    .meta {
      display: flex;
      align-items: center;
      flex-wrap: wrap;
      gap: 6px;
    }

    .chip {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      border: 1px solid var(--line);
      border-radius: 999px;
      min-height: 24px;
      padding: 2px 8px;
      color: var(--muted);
      background: #ffffff;
      font-size: 12px;
      white-space: nowrap;
    }

    .chip.high {
      color: var(--red);
      border-color: rgba(180, 35, 24, 0.24);
      background: rgba(180, 35, 24, 0.07);
    }

    .chip.medium {
      color: var(--amber);
      border-color: rgba(180, 83, 9, 0.24);
      background: rgba(180, 83, 9, 0.08);
    }

    .chip.low {
      color: var(--green);
      border-color: rgba(15, 118, 110, 0.24);
      background: rgba(15, 118, 110, 0.08);
    }

    .main {
      min-width: 0;
      overflow: auto;
      padding: 22px;
    }

    .tabs {
      display: flex;
      gap: 8px;
      border-bottom: 1px solid var(--line);
      margin-bottom: 18px;
      overflow-x: auto;
    }

    .tab {
      border: 0;
      border-bottom: 3px solid transparent;
      border-radius: 0;
      background: transparent;
      color: var(--muted);
      padding: 10px 12px;
      min-height: 42px;
      white-space: nowrap;
    }

    .tab.active {
      color: var(--accent);
      border-bottom-color: var(--accent);
      background: transparent;
    }

    .workspace {
      display: none;
    }

    .workspace.active {
      display: block;
    }

    .split {
      display: grid;
      grid-template-columns: minmax(320px, 0.95fr) minmax(360px, 1.05fr);
      gap: 18px;
      align-items: start;
    }

    .panel {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      min-width: 0;
    }

    .panel-header {
      min-height: 56px;
      padding: 14px 16px;
      border-bottom: 1px solid var(--line);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }

    .panel-header h2,
    .panel-header h3 {
      margin: 0;
      font-size: 16px;
      line-height: 1.25;
    }

    .panel-body {
      padding: 16px;
    }

    .stack {
      display: grid;
      gap: 12px;
    }

    .form-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 12px;
    }

    .field {
      display: grid;
      gap: 6px;
    }

    .field.full {
      grid-column: 1 / -1;
    }

    label {
      color: var(--muted);
      font-size: 12px;
      font-weight: 700;
    }

    .section-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 12px;
    }

    .box {
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: #ffffff;
      padding: 14px;
      min-height: 128px;
      display: grid;
      align-content: start;
      gap: 8px;
    }

    .box.wide {
      grid-column: 1 / -1;
    }

    .box h3 {
      margin: 0;
      font-size: 13px;
      color: var(--muted);
      line-height: 1.2;
    }

    .box p,
    .box li {
      margin: 0;
      line-height: 1.65;
      font-size: 14px;
    }

    .box ul {
      margin: 0;
      padding-left: 18px;
    }

    .headline {
      display: grid;
      gap: 10px;
      padding: 16px;
      background: #ffffff;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      margin-bottom: 12px;
    }

    .headline h2 {
      margin: 0;
      font-size: 24px;
      line-height: 1.35;
      letter-spacing: 0;
    }

    .headline p {
      margin: 0;
      color: var(--muted);
      line-height: 1.6;
    }

    .notice {
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: var(--panel-soft);
      padding: 12px;
      color: var(--muted);
      line-height: 1.6;
      font-size: 14px;
    }

    .notice.ok {
      border-color: rgba(15, 118, 110, 0.25);
      background: rgba(15, 118, 110, 0.08);
      color: var(--green);
    }

    .notice.error {
      border-color: rgba(180, 35, 24, 0.28);
      background: rgba(180, 35, 24, 0.08);
      color: var(--red);
    }

    .source-list,
    .watch-list {
      display: grid;
      gap: 8px;
    }

    .source-row,
    .watch-row {
      border: 1px solid var(--line);
      border-radius: var(--radius);
      padding: 10px;
      background: #ffffff;
      display: grid;
      gap: 6px;
    }

    .source-row a {
      color: var(--accent);
      word-break: break-all;
    }

    .empty {
      border: 1px dashed #b8c3cf;
      border-radius: var(--radius);
      color: var(--muted);
      min-height: 120px;
      display: grid;
      place-items: center;
      padding: 16px;
      text-align: center;
      line-height: 1.6;
    }

    .actions {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      align-items: center;
    }

    .prompt {
      white-space: pre-wrap;
      line-height: 1.55;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      padding: 14px;
      background: #0f172a;
      color: #e5e7eb;
      overflow: auto;
      max-height: 480px;
      font-family: Consolas, "Yu Gothic", monospace;
      font-size: 13px;
    }

    .hidden {
      display: none !important;
    }

    @media (max-width: 1020px) {
      .layout {
        grid-template-columns: 1fr;
      }

      .sidebar {
        border-right: 0;
        border-bottom: 1px solid var(--line);
      }

      .news-list {
        grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
        max-height: 320px;
      }

      .split {
        grid-template-columns: 1fr;
      }
    }

    @media (max-width: 680px) {
      .topbar {
        height: auto;
        align-items: flex-start;
        padding: 14px;
        flex-direction: column;
      }

      .main {
        padding: 14px;
      }

      .filter-row,
      .form-grid,
      .section-grid {
        grid-template-columns: 1fr;
      }

      .headline h2 {
        font-size: 20px;
      }

      textarea {
        min-height: 300px;
      }
    }
  </style>
</head>
<body>
  <div class="shell">
    <header class="topbar">
      <div class="brand">
        <div class="brand-mark" aria-hidden="true"></div>
        <div>
          <h1>news-box</h1>
          <span>structured news briefs</span>
        </div>
      </div>
      <div class="top-actions">
        <button id="copyPromptButton" type="button">プロンプトをコピー</button>
        <button id="sampleButton" type="button">サンプル投入</button>
        <button id="newButton" class="primary" type="button">新規登録</button>
      </div>
    </header>

    <div class="layout">
      <aside class="sidebar">
        <div class="filters">
          <div class="filter-row">
            <input id="searchInput" type="search" placeholder="検索">
            <select id="filterStatus" aria-label="ステータス">
              <option value="">すべて</option>
              <option value="AI生成">AI生成</option>
              <option value="確認済み">確認済み</option>
              <option value="人間が編集済み">人間が編集済み</option>
              <option value="要再確認">要再確認</option>
            </select>
          </div>
          <div class="filter-row">
            <select id="filterImportance" aria-label="重要度">
              <option value="">重要度</option>
              <option value="high">high</option>
              <option value="medium">medium</option>
              <option value="low">low</option>
            </select>
            <select id="filterConfidence" aria-label="信頼度">
              <option value="">信頼度</option>
              <option value="high">high</option>
              <option value="medium">medium</option>
              <option value="low">low</option>
            </select>
          </div>
        </div>
        <div id="newsList" class="news-list"></div>
      </aside>

      <main class="main">
        <nav class="tabs" aria-label="表示切替">
          <button class="tab active" data-tab="register" type="button">登録</button>
          <button class="tab" data-tab="detail" type="button">詳細</button>
          <button class="tab" data-tab="prompt" type="button">プロンプト</button>
        </nav>

        <section id="registerView" class="workspace active">
          <div class="split">
            <section class="panel">
              <div class="panel-header">
                <h2>JSON貼り付け</h2>
                <div class="actions">
                  <button id="formatButton" type="button">整形</button>
                  <button id="clearButton" type="button">クリア</button>
                </div>
              </div>
              <div class="panel-body stack">
                <textarea id="jsonInput" spellcheck="false"></textarea>
                <div id="validationMessage" class="notice">未入力</div>
              </div>
            </section>

            <section class="panel">
              <div class="panel-header">
                <h2>プレビューと編集</h2>
                <div class="actions">
                  <button id="registerButton" class="primary" type="button" disabled>登録</button>
                </div>
              </div>
              <div class="panel-body stack">
                <div id="editorEmpty" class="empty">JSONを読み込むと表示されます</div>
                <form id="editorForm" class="stack hidden">
                  <div class="form-grid">
                    <div class="field full">
                      <label for="fieldTitle">タイトル</label>
                      <input id="fieldTitle" data-field="title" type="text">
                    </div>
                    <div class="field">
                      <label for="fieldCategory">カテゴリ</label>
                      <input id="fieldCategory" data-field="category" type="text">
                    </div>
                    <div class="field">
                      <label for="fieldStatus">ステータス</label>
                      <select id="fieldStatus" data-field="status">
                        <option>AI生成</option>
                        <option>確認済み</option>
                        <option>人間が編集済み</option>
                        <option>要再確認</option>
                      </select>
                    </div>
                    <div class="field">
                      <label for="fieldImportance">重要度</label>
                      <select id="fieldImportance" data-field="importance">
                        <option>high</option>
                        <option>medium</option>
                        <option>low</option>
                      </select>
                    </div>
                    <div class="field">
                      <label for="fieldConfidence">信頼度</label>
                      <select id="fieldConfidence" data-field="confidence">
                        <option>high</option>
                        <option>medium</option>
                        <option>low</option>
                      </select>
                    </div>
                    <div class="field full">
                      <label for="fieldMainPoint">本題</label>
                      <textarea id="fieldMainPoint" data-field="main_point"></textarea>
                    </div>
                    <div class="field full">
                      <label for="fieldSummary">要約</label>
                      <textarea id="fieldSummary" data-field="summary"></textarea>
                    </div>
                    <div class="field full">
                      <label for="fieldBackground">背景</label>
                      <textarea id="fieldBackground" data-field="background"></textarea>
                    </div>
                    <div class="field full">
                      <label for="fieldAnalysis">分析</label>
                      <textarea id="fieldAnalysis" data-field="analysis"></textarea>
                    </div>
                    <div class="field full">
                      <label for="fieldUncertainty">不確実な点</label>
                      <textarea id="fieldUncertainty" data-field="uncertainty"></textarea>
                    </div>
                    <div class="field full">
                      <label for="fieldWatchNext">次に見るべきこと</label>
                      <textarea id="fieldWatchNext" data-field="watch_next_text"></textarea>
                    </div>
                    <div class="field full">
                      <label for="fieldSources">出典</label>
                      <textarea id="fieldSources" data-field="sources_text"></textarea>
                    </div>
                  </div>
                </form>
              </div>
            </section>
          </div>
        </section>

        <section id="detailView" class="workspace">
          <div id="detailEmpty" class="empty">ニュースを選択してください</div>
          <article id="detailArticle" class="hidden"></article>
        </section>

        <section id="promptView" class="workspace">
          <section class="panel">
            <div class="panel-header">
              <h2>ChatGPT用プロンプト</h2>
              <button id="copyPromptButton2" type="button">コピー</button>
            </div>
            <div class="panel-body">
              <pre id="promptText" class="prompt"></pre>
            </div>
          </section>
        </section>
      </main>
    </div>
  </div>

  <script>
    const STORAGE_KEY = "news-box-items";
    const requiredFields = ["title", "category", "importance", "main_point", "summary", "analysis", "confidence"];
    const choiceFields = {
      importance: ["high", "medium", "low"],
      confidence: ["high", "medium", "low"],
      status: ["AI生成", "確認済み", "人間が編集済み", "要再確認"]
    };

    const sampleNews = {
      title: "政府、AI活用指針の改定案を公表",
      category: "政策",
      importance: "medium",
      main_point: "政府は生成AIの利用拡大を前提に、透明性とリスク管理を重視した指針改定案を示した。",
      summary: "改定案では、AI利用時の説明責任、個人情報保護、誤情報対策を重点項目として整理している。企業や自治体がAIを導入する際の確認項目も明確化された。",
      background: "生成AIの業務利用が広がる一方で、著作権、個人情報、誤情報、説明責任をめぐる課題が続いている。",
      analysis: "規制強化というより、利用を止めずに管理水準をそろえる狙いが強い。企業側にはAI利用ルールの文書化や運用記録の整備が求められやすくなる。",
      uncertainty: "最終版で義務に近い表現が増えるか、業界別の細則が出るかはまだ分からない。",
      watch_next: [
        "最終版の公開時期",
        "企業向けチェックリストの具体化",
        "自治体や教育機関での採用状況"
      ],
      sources: [
        {
          title: "政府発表資料",
          url: "https://example.com/ai-policy",
          published_at: "2026-07-07"
        }
      ],
      confidence: "medium",
      status: "AI生成",
      created_by: "chatgpt"
    };

    const promptTemplate = `以下のニュース情報を、指定JSON形式だけで出力してください。
Markdownや説明文は不要です。JSON以外の文字は出さないでください。

ルール:
- 事実と分析を混ぜない
- 本文にない事実は断定しない
- 推測は uncertainty に入れる
- summary は短く
- analysis は「なぜ重要か」を中心にする
- confidence は high / medium / low のいずれか
- importance は high / medium / low のいずれか
- sources には分かる範囲でURLと出典名を入れる

JSON形式:
{
  "title": "",
  "category": "",
  "importance": "medium",
  "main_point": "",
  "summary": "",
  "background": "",
  "analysis": "",
  "uncertainty": "",
  "watch_next": [],
  "sources": [
    {
      "title": "",
      "url": "",
      "published_at": ""
    }
  ],
  "confidence": "medium",
  "status": "AI生成",
  "created_by": "chatgpt"
}

ニュース情報:
`;

    const state = {
      items: [],
      draft: null,
      selectedId: null
    };

    const els = {
      jsonInput: document.getElementById("jsonInput"),
      validationMessage: document.getElementById("validationMessage"),
      editorForm: document.getElementById("editorForm"),
      editorEmpty: document.getElementById("editorEmpty"),
      registerButton: document.getElementById("registerButton"),
      formatButton: document.getElementById("formatButton"),
      clearButton: document.getElementById("clearButton"),
      sampleButton: document.getElementById("sampleButton"),
      newButton: document.getElementById("newButton"),
      newsList: document.getElementById("newsList"),
      searchInput: document.getElementById("searchInput"),
      filterStatus: document.getElementById("filterStatus"),
      filterImportance: document.getElementById("filterImportance"),
      filterConfidence: document.getElementById("filterConfidence"),
      detailEmpty: document.getElementById("detailEmpty"),
      detailArticle: document.getElementById("detailArticle"),
      promptText: document.getElementById("promptText"),
      copyPromptButton: document.getElementById("copyPromptButton"),
      copyPromptButton2: document.getElementById("copyPromptButton2")
    };

    function cleanJsonText(text) {
      return text
        .trim()
        .replace(/^```(?:json)?/i, "")
        .replace(/```$/i, "")
        .trim();
    }

    function normalizeNews(raw) {
      const news = { ...raw };
      news.title = String(news.title || "").trim();
      news.category = String(news.category || "").trim();
      news.importance = choiceFields.importance.includes(news.importance) ? news.importance : "medium";
      news.confidence = choiceFields.confidence.includes(news.confidence) ? news.confidence : "medium";
      news.status = choiceFields.status.includes(news.status) ? news.status : "AI生成";
      news.main_point = String(news.main_point || "").trim();
      news.summary = String(news.summary || news.one_line_summary || "").trim();
      news.background = String(news.background || "").trim();
      news.analysis = String(news.analysis || "").trim();
      news.uncertainty = String(news.uncertainty || "").trim();
      news.created_by = String(news.created_by || "chatgpt").trim();
      news.watch_next = Array.isArray(news.watch_next)
        ? news.watch_next.map((item) => String(item).trim()).filter(Boolean)
        : String(news.watch_next || "").split(/\n+/).map((item) => item.trim()).filter(Boolean);
      news.sources = Array.isArray(news.sources)
        ? news.sources.map(normalizeSource).filter((source) => source.title || source.url)
        : parseSourcesText(String(news.sources || ""));
      return news;
    }

    function normalizeSource(source) {
      if (typeof source === "string") {
        return { title: source, url: source.startsWith("http") ? source : "", published_at: "" };
      }
      return {
        title: String(source.title || source.name || "").trim(),
        url: String(source.url || "").trim(),
        published_at: String(source.published_at || source.date || "").trim()
      };
    }

    function validateNews(news) {
      const errors = [];
      requiredFields.forEach((field) => {
        if (!String(news[field] || "").trim()) {
          errors.push(`${field} が未入力です`);
        }
      });
      if (!choiceFields.importance.includes(news.importance)) {
        errors.push("importance は high / medium / low のいずれかです");
      }
      if (!choiceFields.confidence.includes(news.confidence)) {
        errors.push("confidence は high / medium / low のいずれかです");
      }
      if (news.sources.some((source) => source.url && !/^https?:\/\//.test(source.url))) {
        errors.push("出典URLは http または https で始めてください");
      }
      return errors;
    }

    function parseJsonInput() {
      const text = cleanJsonText(els.jsonInput.value);
      if (!text) {
        setValidation("未入力", "notice");
        state.draft = null;
        renderEditor();
        return;
      }

      try {
        const parsed = JSON.parse(text);
        const normalized = normalizeNews(parsed);
        const errors = validateNews(normalized);
        if (errors.length) {
          setValidation(errors.join(" / "), "notice error");
          state.draft = normalized;
          renderEditor();
          els.registerButton.disabled = true;
          return;
        }
        state.draft = normalized;
        setValidation("JSON OK", "notice ok");
        renderEditor();
        els.registerButton.disabled = false;
      } catch (error) {
        setValidation(error.message, "notice error");
        state.draft = null;
        renderEditor();
      }
    }

    function setValidation(message, className) {
      els.validationMessage.textContent = message;
      els.validationMessage.className = className;
    }

    function renderEditor() {
      if (!state.draft) {
        els.editorEmpty.classList.remove("hidden");
        els.editorForm.classList.add("hidden");
        els.registerButton.disabled = true;
        return;
      }

      els.editorEmpty.classList.add("hidden");
      els.editorForm.classList.remove("hidden");
      const draft = state.draft;
      setField("title", draft.title);
      setField("category", draft.category);
      setField("status", draft.status);
      setField("importance", draft.importance);
      setField("confidence", draft.confidence);
      setField("main_point", draft.main_point);
      setField("summary", draft.summary);
      setField("background", draft.background);
      setField("analysis", draft.analysis);
      setField("uncertainty", draft.uncertainty);
      setField("watch_next_text", draft.watch_next.join("\n"));
      setField("sources_text", formatSourcesText(draft.sources));
    }

    function setField(field, value) {
      const input = els.editorForm.querySelector(`[data-field="${field}"]`);
      if (input) input.value = value || "";
    }

    function syncDraftFromForm() {
      if (!state.draft) return;
      els.editorForm.querySelectorAll("[data-field]").forEach((input) => {
        const field = input.dataset.field;
        if (field === "watch_next_text") {
          state.draft.watch_next = input.value.split(/\n+/).map((item) => item.trim()).filter(Boolean);
        } else if (field === "sources_text") {
          state.draft.sources = parseSourcesText(input.value);
        } else {
          state.draft[field] = input.value;
        }
      });

      const errors = validateNews(state.draft);
      if (errors.length) {
        setValidation(errors.join(" / "), "notice error");
        els.registerButton.disabled = true;
      } else {
        setValidation("JSON OK", "notice ok");
        els.registerButton.disabled = false;
      }
    }

    function parseSourcesText(text) {
      return text
        .split(/\n+/)
        .map((line) => line.trim())
        .filter(Boolean)
        .map((line) => {
          const parts = line.split("|").map((part) => part.trim());
          return {
            title: parts[0] || "",
            url: parts[1] || "",
            published_at: parts[2] || ""
          };
        });
    }

    function formatSourcesText(sources) {
      return sources
        .map((source) => [source.title, source.url, source.published_at].filter(Boolean).join(" | "))
        .join("\n");
    }

    function registerDraft() {
      syncDraftFromForm();
      if (!state.draft || validateNews(state.draft).length) return;
      const now = new Date().toISOString();
      const item = {
        ...state.draft,
        id: crypto.randomUUID ? crypto.randomUUID() : String(Date.now()),
        created_at: now,
        updated_at: now
      };
      state.items.unshift(item);
      state.selectedId = item.id;
      saveItems();
      renderList();
      renderDetail();
      switchTab("detail");
      clearDraft();
    }

    function loadItems() {
      try {
        state.items = JSON.parse(localStorage.getItem(STORAGE_KEY) || "[]");
      } catch {
        state.items = [];
      }
    }

    function saveItems() {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(state.items));
    }

    function getFilteredItems() {
      const keyword = els.searchInput.value.trim().toLowerCase();
      return state.items.filter((item) => {
        const target = [item.title, item.category, item.main_point, item.summary, item.analysis].join(" ").toLowerCase();
        return (!keyword || target.includes(keyword))
          && (!els.filterStatus.value || item.status === els.filterStatus.value)
          && (!els.filterImportance.value || item.importance === els.filterImportance.value)
          && (!els.filterConfidence.value || item.confidence === els.filterConfidence.value);
      });
    }

    function renderList() {
      const items = getFilteredItems();
      els.newsList.innerHTML = "";
      if (!items.length) {
        const empty = document.createElement("div");
        empty.className = "empty";
        empty.textContent = "登録済みニュースはありません";
        els.newsList.appendChild(empty);
        return;
      }

      items.forEach((item) => {
        const button = document.createElement("button");
        button.type = "button";
        button.className = `news-item ${item.id === state.selectedId ? "active" : ""}`;
        button.innerHTML = `
          <div class="meta">
            <span class="chip">${escapeHtml(item.category)}</span>
            <span class="chip ${item.importance}">重要度 ${item.importance}</span>
            <span class="chip ${item.confidence}">信頼度 ${item.confidence}</span>
          </div>
          <h3>${escapeHtml(item.title)}</h3>
          <p>${escapeHtml(item.main_point)}</p>
          <div class="meta">
            <span class="chip">${escapeHtml(item.status)}</span>
          </div>
        `;
        button.addEventListener("click", () => {
          state.selectedId = item.id;
          renderList();
          renderDetail();
          switchTab("detail");
        });
        els.newsList.appendChild(button);
      });
    }

    function renderDetail() {
      const item = state.items.find((entry) => entry.id === state.selectedId);
      if (!item) {
        els.detailEmpty.classList.remove("hidden");
        els.detailArticle.classList.add("hidden");
        return;
      }

      els.detailEmpty.classList.add("hidden");
      els.detailArticle.classList.remove("hidden");
      els.detailArticle.innerHTML = `
        <div class="headline">
          <div class="meta">
            <span class="chip">${escapeHtml(item.category)}</span>
            <span class="chip ${item.importance}">重要度 ${item.importance}</span>
            <span class="chip ${item.confidence}">信頼度 ${item.confidence}</span>
            <span class="chip">${escapeHtml(item.status)}</span>
          </div>
          <h2>${escapeHtml(item.title)}</h2>
          <p>${escapeHtml(item.main_point)}</p>
          <div class="actions">
            <button type="button" data-action="edit">編集へ戻す</button>
            <button type="button" data-action="json">JSON表示</button>
          </div>
        </div>
        <div class="section-grid">
          ${renderBox("要約", item.summary, true)}
          ${renderBox("背景", item.background || "未入力", false)}
          ${renderBox("分析", item.analysis, true)}
          ${renderBox("不確実な点", item.uncertainty || "未入力", false)}
          ${renderListBox("次に見るべきこと", item.watch_next)}
          ${renderSourceBox(item.sources)}
        </div>
      `;

      els.detailArticle.querySelector('[data-action="edit"]').addEventListener("click", () => {
        state.draft = normalizeNews(item);
        els.jsonInput.value = JSON.stringify(state.draft, null, 2);
        renderEditor();
        setValidation("JSON OK", "notice ok");
        els.registerButton.disabled = false;
        switchTab("register");
      });

      els.detailArticle.querySelector('[data-action="json"]').addEventListener("click", async () => {
        await copyText(JSON.stringify(item, null, 2));
      });
    }

    function renderBox(title, body, wide) {
      return `
        <section class="box ${wide ? "wide" : ""}">
          <h3>${escapeHtml(title)}</h3>
          <p>${escapeHtml(body)}</p>
        </section>
      `;
    }

    function renderListBox(title, items) {
      const rows = items.length
        ? `<ul>${items.map((item) => `<li>${escapeHtml(item)}</li>`).join("")}</ul>`
        : "<p>未入力</p>";
      return `<section class="box"><h3>${escapeHtml(title)}</h3>${rows}</section>`;
    }

    function renderSourceBox(sources) {
      const rows = sources.length
        ? sources.map((source) => `
          <div class="source-row">
            <strong>${escapeHtml(source.title || "出典")}</strong>
            ${source.url ? `<a href="${escapeAttribute(source.url)}" target="_blank" rel="noreferrer">${escapeHtml(source.url)}</a>` : ""}
            ${source.published_at ? `<span class="chip">${escapeHtml(source.published_at)}</span>` : ""}
          </div>
        `).join("")
        : "<p>未入力</p>";
      return `<section class="box"><h3>出典</h3><div class="source-list">${rows}</div></section>`;
    }

    function clearDraft() {
      els.jsonInput.value = "";
      state.draft = null;
      setValidation("未入力", "notice");
      renderEditor();
    }

    function switchTab(tabName) {
      document.querySelectorAll(".tab").forEach((tab) => {
        tab.classList.toggle("active", tab.dataset.tab === tabName);
      });
      document.querySelectorAll(".workspace").forEach((view) => {
        view.classList.remove("active");
      });
      document.getElementById(`${tabName}View`).classList.add("active");
    }

    function escapeHtml(value) {
      return String(value || "")
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    function escapeAttribute(value) {
      return escapeHtml(value).replaceAll("`", "&#096;");
    }

    async function copyText(text) {
      try {
        await navigator.clipboard.writeText(text);
      } catch {
        const textarea = document.createElement("textarea");
        textarea.value = text;
        document.body.appendChild(textarea);
        textarea.select();
        document.execCommand("copy");
        textarea.remove();
      }
    }

    function init() {
      loadItems();
      els.promptText.textContent = promptTemplate;
      els.jsonInput.addEventListener("input", parseJsonInput);
      els.editorForm.addEventListener("input", syncDraftFromForm);
      els.registerButton.addEventListener("click", registerDraft);
      els.formatButton.addEventListener("click", () => {
        if (!state.draft) parseJsonInput();
        if (state.draft) els.jsonInput.value = JSON.stringify(state.draft, null, 2);
      });
      els.clearButton.addEventListener("click", clearDraft);
      els.sampleButton.addEventListener("click", () => {
        els.jsonInput.value = JSON.stringify(sampleNews, null, 2);
        parseJsonInput();
        switchTab("register");
      });
      els.newButton.addEventListener("click", () => {
        clearDraft();
        switchTab("register");
      });
      els.copyPromptButton.addEventListener("click", () => copyText(promptTemplate));
      els.copyPromptButton2.addEventListener("click", () => copyText(promptTemplate));
      document.querySelectorAll(".tab").forEach((tab) => {
        tab.addEventListener("click", () => switchTab(tab.dataset.tab));
      });
      [els.searchInput, els.filterStatus, els.filterImportance, els.filterConfidence].forEach((input) => {
        input.addEventListener("input", renderList);
      });
      renderList();
      renderDetail();
    }

    init();
  </script>
</body>
</html>
